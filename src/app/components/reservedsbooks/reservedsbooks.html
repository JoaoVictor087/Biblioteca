<div class="flex flex-row flex-wrap gap-4 p-4">
  @for (reserva of reservedBooks(); track reserva.id) {
    <div class="flex flex-col w-40 rounded-lg shadow-md overflow-hidden bg-white hover:shadow-lg transition-shadow duration-200">

      <div class="relative h-52 w-full">
        <img [ngSrc]="reserva.livro.capa || 'https://placehold.co/400x600'"
             [alt]="reserva.livro.titulo"
             fill
             class="object-cover">
      </div>

      <div class="flex flex-col gap-1 p-2 flex-1">
        <p class="text-sm font-semibold text-gray-800 line-clamp-2 leading-tight">
          {{ reserva.livro.titulo }}
        </p>
        <p class="text-xs text-gray-500">{{ reserva.livro.autor }}</p>

        <p class="text-[10px] font-bold text-blue-600 uppercase">
          Status: {{ reserva.status }}
        </p>
        <p class="text-[10px] font-bold text-blue-600 uppercase">
          Início: {{ reserva.dataAluguel | date:'dd/MM/yyyy' }}
        </p>
        <p class="text-[10px] font-bold text-blue-600 uppercase">
          Fim: {{ reserva.dataDevolucao | date:'dd/MM/yyyy' }}
        </p>

      </div>

      <div class="p-2 pt-0">
        <button class="w-full text-xs bg-red-500 hover:bg-red-600 text-white font-medium py-1.5 rounded-md transition-colors duration-150">
          Cancelar
        </button>
      </div>

    </div>
  } @empty {
    <p class="text-gray-500 text-center w-full py-10">Você não possui livros reservados.</p>
  }
</div>
