<div class="flex flex-row flex-wrap gap-4 p-4">
  @for (book of books(); track book.id) {
    <div class="flex flex-col w-40 rounded-lg shadow-md overflow-hidden bg-white hover:shadow-lg transition-shadow duration-200">

      <div class="relative h-52 w-full">
        <img [ngSrc]="book.capa" [alt]="book.titulo" fill class="object-cover">
      </div>

      <div class="flex flex-col gap-1 p-2 flex-1">
        <p class="text-sm font-semibold text-gray-800 line-clamp-2 leading-tight">{{ book.titulo }}</p>
        <p class="text-xs text-gray-500">{{ book.autor }}</p>
        <p class="text-xs text-gray-400">{{ book.quantidadeDisponivel }} disponivel</p>
      </div>

      <div class="p-2 pt-0">
        <button (click)="reserveBook(book.id)" class="w-full text-xs bg-blue-600 hover:bg-blue-700 text-white font-medium py-1.5 rounded-md transition-colors duration-150">
          Reservar
        </button>
      </div>

    </div>
  } @empty {
    <p class="text-content text-center col-span-full">Sem livros disponiveis para reserva</p>
  }
</div>
