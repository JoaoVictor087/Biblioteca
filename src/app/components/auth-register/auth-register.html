<div class="flex flex-col justify-center items-center min-h-screen">
  <app-logo class="mb-20"></app-logo>
  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-2">
    <label for="nome"></label>
    <input
      class="px-20 bg-surface rounded-2xl py-5 text-center"
      type="text"
      id="username"
      name="nome"
      formControlName="username"
      placeholder="Digite seu nome"
    >

    <label for="email"></label>
    <input
      class="px-20 bg-surface rounded-2xl py-5 text-center"
      type="text"
      id="email"
      formControlName="email"
      name="email"
      placeholder="Digite seu email"
    >

    <label for="password"></label>
    <input
      class="px-20 bg-surface rounded-2xl py-5 text-center"
      type="password"
      id="password"
      formControlName="password"
      name="senha"
      placeholder="Digite sua senha"
    >

    <button
      class="px-20 bg-primary rounded-2xl py-5 text-center mt-2"
      type="submit"
    >
      Cadastrar
    </button>
  </form>
  <a routerLink="/login" class="text-content mt-5">Já tem conta? Clique Aqui</a>
</div>
